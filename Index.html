<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gmail Signature - SolveByte</title>
</head>
<body style="margin: 0; padding: 20px; background-color: #f5f5f5; font-family: Arial, Helvetica, sans-serif;">

<!-- Gmail Signature Start -->
<table cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #333333; max-width: 600px;">
  <tr>
    <td style="vertical-align: top; padding-right: 20px;">
      <!-- SolveByte Logo -->
      <img src="https://api-ap-south-mum-1.openstack.acecloudhosting.com:8080/solvebyte-signature/Solvebyte-Logo.png" alt="SolveByte Logo" width="120" height="120" style="display: block; width: 120px; height: 120px; object-fit: contain;" />
    </td>
    <td style="vertical-align: top; padding-left: 10px;">
      <!-- Name & Designation -->
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="font-size: 24px; font-weight: bold; color: #0065C3; font-family: Arial, Helvetica, sans-serif; padding-bottom: 2px;">
            Name
          </td>
        </tr>
        <tr>
          <td style="font-size: 14px; color: #333333;font-weight: 400; font-family: Arial, Helvetica, sans-serif; padding-bottom: 12px;">
            Designation
          </td>
        </tr>
        <tr>
          <td style="border-bottom: 1px solid #000000; line-height: 0; font-size: 0; padding: 0; margin: 0;" colspan="1">
            &nbsp;
          </td>
        </tr>
        <!-- Contact Info -->
        <tr>
          <td style="padding-top: 12px;">
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <!-- Phone -->
                <td style="vertical-align: middle; padding-right: 5px;">
                  <img src="https://api-ap-south-mum-1.openstack.acecloudhosting.com:8080/solvebyte-signature/call.svg" alt="Phone" width="16" height="16" style="display: block;" />
                </td>
                <td style="vertical-align: middle; font-size: 14px; color: #333333;font-weight: 400; font-family: Arial, Helvetica, sans-serif; padding-right: 10px;">
                  <a href="tel:0000000000" style="color: #333333; text-decoration: none;">00000-00000</a>
                </td>
                <!-- Email -->
                <td style="vertical-align: middle; padding-right: 5px;">
                  <img src="https://api-ap-south-mum-1.openstack.acecloudhosting.com:8080/solvebyte-signature/message-text.svg" alt="Email" width="16" height="16" style="display: block;" />
                </td>
                <td style="vertical-align: middle; font-size: 14px; color: #333333;font-weight: 400; font-family: Arial, Helvetica, sans-serif;">
                  <a href="mailto:abc@solvebyte.com" style="color: #333333; text-decoration: none;">abc@solvebyte.com</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Website -->
        <tr>
          <td style="padding-top: 8px; display: flex; gap: 10px;">
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="vertical-align: middle; padding-right: 5px;">
                  <img src="https://api-ap-south-mum-1.openstack.acecloudhosting.com:8080/solvebyte-signature/global-search.svg" alt="Website" width="16" height="16" style="display: block;" />
                </td>
                <td style="vertical-align: middle; font-size: 14px; color: #333333;font-weight: 400; font-family: Arial, Helvetica, sans-serif;">
                  <a href="https://www.solvebyte.com" target="_blank" style="color: #333333; text-decoration: none;">www.solvebyte.com</a>
                </td>
              </tr>
            </table>
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="vertical-align: middle; padding-right: 6px;">
                  <a href="https://www.instagram.com/solvebyte" target="_blank" style="text-decoration: none;">
                    <img src="https://api-ap-south-mum-1.openstack.acecloudhosting.com:8080/solvebyte-signature/Layer_1.svg" alt="Instagram" width="16" height="16" style="display: block;" />
                  </a>
                </td>
                <td style="vertical-align: middle; padding-right: 6px;">
                  <a href="https://www.linkedin.com/company/solvebyte" target="_blank" style="text-decoration: none;">
                    <img src="https://api-ap-south-mum-1.openstack.acecloudhosting.com:8080/solvebyte-signature/Layer_1-1.svg" alt="LinkedIn" width="16" height="16" style="display: block;" />
                  </a>
                </td>
                <td style="vertical-align: middle; font-size: 14px; color: #333333;font-weight: 400; font-family: Arial, Helvetica, sans-serif;">
                  <a href="https://www.linkedin.com/company/solvebyte" target="_blank" style="color: #333333; text-decoration: none;">/solvebyte</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <!-- Social Links -->
        <tr>
          <td style="padding-top: 8px;">
            
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

</body>
</html>
